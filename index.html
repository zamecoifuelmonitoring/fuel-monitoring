    <!-- Mainscreen -->
    <div class="card">

        <!-- Title -->
        <div class="header">
            <img src="ZAMECO LOGO.png" alt="ZAMECO I Logo" class="logo">
            <h2>Zambales I Electric Cooperative, Inc.</h2>
        </div>
        <h1>Fuel Monitoring</h1>

        <!-- Date and Municipality selection -->
        <h5> "For GPS and camera features, please open this page in External Browser." </h5>
        <h5>Please allow the location access!</h5><hr>

        <label>Date</label> <input type="text" id="date" readonly>
        <label>Municipality</label> 
        <select id="municipality">
            <option value="">Select Municipality</option>
            <option>STA CRUZ</option>
            <option>CANDELARIA</option>
            <option>MASINLOC</option>
            <option>PALAUIG</option>
            <option>IBA</option>
            <option>BOTOLAN</option>
        </select>

        <label>Specific Station</label>
        <select id="specificLocation">  </select>
        
        <label>Address</label>
        <input type="text" id="stationAddress" readonly>

        <div id="gpsStatus" class="gps-status"> 📍 Acquiring GPS location... </div>
        <div class="preview" id="preview"> No image captured </div>
        <button onclick="openCamera()">📷 Capture Photo</button>
        <input type="file" id="camera" accept="image/*" capture="environment" hidden>
        <div id="status" class="status"></div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>

    // Changing the list of stations based on municipality selection
    document.getElementById("municipality").addEventListener("change", function () {

        const municipality = this.value;
        const locationSelect = document.getElementById("specificLocation");

        locationSelect.innerHTML =
            '<option value="">Select Station</option>';

        
        document.getElementById("stationAddress").value = "";
        
        if (!municipality || !locations[municipality]) return;

        locations[municipality].forEach(item => {

            const option = document.createElement("option");

            option.value = item.station;
            option.textContent = item.station;

            // store address
            option.dataset.address = item.address;

            locationSelect.appendChild(option);

        });

    });

    // When station is selected, fill the address field
    document.getElementById("specificLocation").addEventListener("change", function() {

        const selectedOption = this.options[this.selectedIndex];

        document.getElementById("stationAddress").value =
            selectedOption.dataset.address || "";

    });

    // CONNECTION FOR GDRIVE BACKEND
    const SCRIPT_URL =
    "https://script.google.com/macros/s/AKfycbzwJeSckxflzcOW9o_PHcAARwqPoMSWeuceF_Z0nHW2ELtmjD-hQx4RVZOAg6C669Ba/exec";

    // Set today's date in the date input
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;

    let lat = "";
    let lng = "";
    const gpsStatus = document.getElementById("gpsStatus");

    // Getting user's GPS location
    navigator.geolocation.watchPosition(
        pos => {

            lat = pos.coords.latitude;
            lng = pos.coords.longitude;

            gpsStatus.innerHTML =
                "📍 Latitude: " + Number(lat).toFixed(6) +
                "<br>📍 Longitude: " + Number(lng).toFixed(6);

        },
        err => {

            lat = "";
            lng = "";

            gpsStatus.className = "gps-status gps-error";
            gpsStatus.innerHTML = "❌ Unable to acquire GPS location";

        }
    );

    // Function to open camera after checking if GPS location is acquired
    function openCamera(){
        if(lat === "" || lng === ""){
            alert("Waiting for GPS location. Please try again in a few seconds.");
            return;
        }

        document.getElementById("camera").click();
    }

    // When user captures an image
    document.getElementById("camera").addEventListener("change", function(e){

        const file = e.target.files[0];
        if(!file) return;

        const municipality = document.getElementById("municipality").value;
        if(!municipality){
            alert("Select municipality first");
            return;
        }

        const station = document.getElementById("specificLocation").value;
        if(!station){
            alert("Select station first");
            return;
        }

        document.getElementById("preview").innerHTML = `<img src="${URL.createObjectURL(file)}">`;

        const reader = new FileReader();

        // When the image is loaded, add watermark and EXIF data
        reader.onload = function () {

            const imageData = reader.result;
            const img = new Image();

            // Once the image is loaded, we can draw it on a canvas and add the watermark
            img.onload = function () {

                const municipality = document.getElementById("municipality").value;
                const station = document.getElementById("specificLocation").value;
                const selectedOption = document.getElementById("specificLocation").selectedOptions[0];
                const address = selectedOption.dataset.address || "";
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                // Read orientation from original image
                let orientation = 1;

                try {
                    const exifData = piexif.load(imageData);

                    orientation =
                        exifData["0th"][piexif.ImageIFD.Orientation] || 1;

                } catch (e) {
                    console.log("No orientation EXIF");
                }

                // Adjust canvas and rotation
                if (orientation === 6) {

                    // 90° clockwise
                    canvas.width = img.height;
                    canvas.height = img.width;

                    ctx.rotate(Math.PI / 2);
                    ctx.drawImage(img, 0, -img.height);

                } else if (orientation === 8) {

                    // 90° counter-clockwise
                    canvas.width = img.height;
                    canvas.height = img.width;

                    ctx.rotate(-Math.PI / 2);
                    ctx.drawImage(img, -img.width, 0);

                } else if (orientation === 3) {

                    // 180°
                    canvas.width = img.width;
                    canvas.height = img.height;

                    ctx.rotate(Math.PI);
                    ctx.drawImage(img, -img.width, -img.height);

                } else {

                    canvas.width = img.width;
                    canvas.height = img.height;

                    ctx.drawImage(img, 0, 0);

                }

                const dateTime = new Date().toLocaleString();
                const watermarkLines = [ station, 
                    address + ", REGION III",
                    lat.toFixed(6) + ", " + lng.toFixed(6),
                    dateTime
                ];
                const fontSize = Math.max( 22, Math.round(canvas.width / 45));
                const lineHeight = fontSize + 10;
                const padding = 20;
                const boxHeight = (watermarkLines.length * lineHeight) + (padding * 2);

                ctx.fillStyle = "rgba(0,0,0,0.60)";
                ctx.fillRect(
                    0,
                    canvas.height - boxHeight,
                    canvas.width,
                    boxHeight
                );
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold " + fontSize + "px Arial";

                // Draw each line of the watermark
                watermarkLines.forEach((line, index) => {

                    ctx.fillText(
                        line,
                        padding,
                        canvas.height -
                        boxHeight +
                        padding +
                        ((index + 1) * lineHeight)
                    );

                });

                let finalImageData = canvas.toDataURL( "image/jpeg", 0.95);

                // Adding EXIF data
                try {

                    let exifObj = {
                        "0th": {},
                        Exif: {},
                        GPS: {},
                        "1st": {},
                        thumbnail: null
                    };

                    // Try to load existing EXIF data if present, so we don't overwrite it completely
                    try {

                        exifObj = piexif.load(imageData);

                    } catch(ex) {

                        console.log("No original EXIF found");

                    }

                    // Convert decimal coordinates to DMS format required by EXIF
                    function toDMS(decimal) {

                        const absolute = Math.abs(Number(decimal));
                        const degrees = Math.floor(absolute);
                        const minutesFloat = (absolute - degrees) * 60;
                        const minutes = Math.floor(minutesFloat);
                        const seconds = (minutesFloat - minutes) * 60;

                        return [
                            [degrees, 1],
                            [minutes, 1],
                            [
                                Math.round(
                                    seconds * 10000
                                ),
                                10000
                            ]
                        ];

                    }

                    exifObj.GPS = exifObj.GPS || {};
                    exifObj.GPS[ piexif.GPSIFD.GPSLatitudeRef ] = Number(lat) >= 0 ? "N" : "S";
                    exifObj.GPS[ piexif.GPSIFD.GPSLatitude ] = toDMS(lat);
                    exifObj.GPS[ piexif.GPSIFD.GPSLongitudeRef ] =  Number(lng) >= 0 ? "E" : "W";
                    exifObj.GPS[ piexif.GPSIFD.GPSLongitude ] = toDMS(lng);

                    // Create custom description
                    const description =
                    "Municipality: " + municipality + "\n" +
                    "Station: " + station + "\n" +
                    "Address: " + address + ", REGION III" + "\n" +
                    "Latitude: " + Number(lat).toFixed(6) + "\n" +
                    "Longitude: " + Number(lng).toFixed(6) + "\n" +
                    "Date: " + dateTime;

                    // Store description in EXIF 
                    exifObj["0th"] = exifObj["0th"] || {};
                    exifObj["0th"][  piexif.ImageIFD.ImageDescription ] = description;
                    exifObj.Exif = exifObj.Exif || {};

                    const exifDate = new Date().toISOString().replace("T"," ").substring(0,19);

                    exifObj.Exif[ piexif.ExifIFD.DateTimeOriginal ] = exifDate;
                    exifObj.Exif[ piexif.ExifIFD.DateTimeDigitized ] = exifDate;

                    const exifBytes = piexif.dump(exifObj);

                    finalImageData = piexif.insert( exifBytes, finalImageData );

                }
                // If there's an error with EXIF processing, log it but continue with the image upload
                catch(error) {

                    console.error( "EXIF error:", error );

                }

                document.getElementById("preview").innerHTML = `<img src="${finalImageData}">`;

                const base64 = finalImageData.split(",")[1];

                uploadImage(base64);

            };

            img.src = imageData;

        };

        reader.readAsDataURL(file);

    });

    // Function to upload image to Google Drive via Apps Script
    function uploadImage(base64){

        document.getElementById("status").innerHTML = "<span class='loading'>Uploading...</span>";

        // Send POST request to Apps Script with image data and metadata
        fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({
                municipality: document.getElementById("municipality").value,
                station: document.getElementById("specificLocation").value,
                address: document.getElementById("stationAddress").value,
                dateFolder: today,
                fileName: document.getElementById("camera").files[0].name,
                mimeType: document.getElementById("camera").files[0].type,
                base64Data: base64,
                latitude: lat,
                longitude: lng
            })
        })

        // Parse response from Apps Script
        .then(async res => {
            const text = await res.text();
            return JSON.parse(text);
        })

        // Update status message based on response
        .then(data => {

            if(data.success){

                document.getElementById("status").innerHTML = "<span class='success'>" + data.message + "</span>";

            }else{

                document.getElementById("status").innerHTML = "<span class='error'>" + data.message + "</span>";

            }

        })

        // Handle network or other errors
        .catch(err => {

            console.error(err);

            document.getElementById("status").innerHTML = "<span class='error'>Backend not reachable</span>";

        });
    }
</script>
