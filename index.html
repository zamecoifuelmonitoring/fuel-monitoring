<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Mainscreen -->
    <div class="card">

        <!-- Title -->
        <div class="header">
            <img src="ZAMECO LOGO.png" alt="ZAMECO I Logo" class="logo">
            <h2>Zambales I Electric Cooperative, Inc.</h2>
        </div>
        <h1>Fuel Monitoring</h1>

        <!-- Date and Municipality selection -->
        <h5> "For GPS and camera features, please open this page in External Browser." </h5>
        <h5>Please allow the location access!</h5><hr>

        <label>Date</label> <input type="text" id="date" readonly>
        <label>Municipality</label> 
        <select id="municipality">
            <option value="">Select Municipality</option>
            <option>STA CRUZ</option>
            <option>CANDELARIA</option>
            <option>MASINLOC</option>
            <option>PALAUIG</option>
            <option>IBA</option>
            <option>BOTOLAN</option>
        </select>

        <label>Specific Station</label>
        <select id="specificLocation">  </select>     

        <div class="preview" id="preview">No image captured</div>
        <button onclick="openCamera()">📷 Capture Photo</button>
        <input type="file" id="camera" accept="image/*" capture="environment" hidden>
        <div id="status" class="status"></div>

    </div>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script>
    const locations = {

        "STA CRUZ": [
            "Jetti (Poblacion)",
            "Starport (Real Street)",
            "PTT Gas Station (Lipay)",
            "Starport Gas Service Station",
            "Petron (Lipay)",
            "Jetti (Lipay)",
            "CETRUM GASOLINE STATION (Lipay)",
            "Petro Gazz Sta. Cruz",
            "Casulibay",
        ],

        "CANDELARIA": [
            "808 Fuel",
            "Petro Gazz",
            "Centrum Fuel (Catol)",
            "1Petrol (Catol)",
            "LRE Supreme Fuel Gasoline Station",
            "NCM GASOLINE STATION",
            "Petron (Sinabacan)",
            "PTT (Uacon)",
            "Jetti (Poblacion)",
        ],

        "MASINLOC": [
            "PTT Station Masinloc",
            "Agra Gas South Poblacion",
            "Big-H",
            "BOSS Gasoline Station",
            "1 PetroL-SDG",
            "GabRon Gasoline Station",
            "JAYHAN",
        ],

        "PALAUIG": [
            "PTT Gas Station (PTT Palauig)",
            "Petron (Palauig)",
            "King Fuel",
        ],

        "IBA": [
            "MC Petron Bulilit Station",
            "1Petrol (Palanginan)",
            "Phoenix Gas Station (Palanginan)",
            "PTT IBA Gasoline Station (Palanginan)",
            "Primer Gas Station (GH)",
            "Centrum Fuel (Dirita)",
            "Petron (Zone 1, Iba)",
            "Primer Jr. Gas Station",
            "PTT IBA Gasoline Station (Dirita)",
            "BLC Gas Station",
            "Centrum Fuel (Bangantalinga)",
            "Phoenix Gas Station (Bangantalinga)",
            "MJQ Fuel",
            "Traveller's Petron Servicenter (Victory liner)",
            "Agra Gas (Amungan)",
        ],

        "BOTOLAN": [
            "Flying V Gas Station",
            "Agra Gas (Tampo)",
            "Primer Gas Station (Batonlapoc)",
            "Taugtog RMS Micro Gas Station",
            "Primer Gas (Taugtog)",
            "RMS San Miguel micro gas station",
            "Primer Gas Station (Bucao)",
        ]
    };

    // Changing the list of stations based on municipality selection
    document.getElementById("municipality").addEventListener("change", function () {

        const municipality = this.value;
        const locationSelect = document.getElementById("specificLocation");

        locationSelect.innerHTML =
            '<option value="">Select Station</option>';

        if (!municipality || !locations[municipality]) return;

        locations[municipality].forEach(location => {

            const option = document.createElement("option");

            option.value = location;
            option.textContent = location;

            locationSelect.appendChild(option);

        });

    });

    // CONNECTION FOR GDRIVE BACKEND
    const SCRIPT_URL =
    "https://script.google.com/macros/s/AKfycbzwJeSckxflzcOW9o_PHcAARwqPoMSWeuceF_Z0nHW2ELtmjD-hQx4RVZOAg6C669Ba/exec";

    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").value = today;

    let lat = "";
    let lng = "";

    navigator.geolocation.getCurrentPosition(
    pos => {
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;
    },
    err => {
        lat = "";
        lng = "";
    }
    );

    function openCamera(){
        document.getElementById("camera").click();
    }

    document.getElementById("camera").addEventListener("change", function(e){

        const file = e.target.files[0];
        if(!file) return;

        const municipality = document.getElementById("municipality").value;
        if(!municipality){
            alert("Select municipality first");
            return;
        }

        const station = document.getElementById("specificLocation").value;
        if(!station){
            alert("Select station first");
            return;
        }

        document.getElementById("preview").innerHTML = `<img src="${URL.createObjectURL(file)}">`;

        const reader = new FileReader();

        reader.onload = function () {

            const imageData = reader.result;

            const img = new Image();

            img.onload = function () {

                const municipality = document.getElementById("municipality").value;
                const station = document.getElementById("specificLocation").value;
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                canvas.width = img.width;
                canvas.height = img.height;

                ctx.drawImage(img, 0, 0);

                const dateTime = new Date().toLocaleString();

                const watermarkLines = [ station + ", " + municipality + ", ZAMBALES, REGION III,",
                    lat + ", " + lng,
                    dateTime
                ];

                const fontSize = Math.max( 22, Math.round(canvas.width / 45));
                const lineHeight = fontSize + 10;
                const padding = 20;
                const boxHeight = (watermarkLines.length * lineHeight) + (padding * 2);
                ctx.fillStyle = "rgba(0,0,0,0.60)";

                ctx.fillRect(
                    0,
                    canvas.height - boxHeight,
                    canvas.width,
                    boxHeight
                );

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold " + fontSize + "px Arial";

                watermarkLines.forEach((line, index) => {

                    ctx.fillText(
                        line,
                        padding,
                        canvas.height -
                        boxHeight +
                        padding +
                        ((index + 1) * lineHeight)
                    );

                });

                let finalImageData = canvas.toDataURL( "image/jpeg", 0.95);

                try {

                    let exifObj = {
                        "0th": {},
                        Exif: {},
                        GPS: {},
                        "1st": {},
                        thumbnail: null
                    };

                    try {

                        exifObj = piexif.load(imageData);

                    } catch(ex) {

                        console.log("No original EXIF found");

                    }

                    function toDMS(decimal) {

                        const absolute = Math.abs(Number(decimal));
                        const degrees = Math.floor(absolute);
                        const minutesFloat = (absolute - degrees) * 60;
                        const minutes = Math.floor(minutesFloat);
                        const seconds = (minutesFloat - minutes) * 60;

                        return [
                            [degrees, 1],
                            [minutes, 1],
                            [
                                Math.round(
                                    seconds * 10000
                                ),
                                10000
                            ]
                        ];

                    }

                    exifObj.GPS = exifObj.GPS || {};
                    exifObj.GPS[ piexif.GPSIFD.GPSLatitudeRef ] = Number(lat) >= 0 ? "N" : "S";
                    exifObj.GPS[ piexif.GPSIFD.GPSLatitude ] = toDMS(lat);
                    exifObj.GPS[ piexif.GPSIFD.GPSLongitudeRef ] =  Number(lng) >= 0 ? "E" : "W";
                    exifObj.GPS[ piexif.GPSIFD.GPSLongitude ] = toDMS(lng);

                    // Create custom description
                    const description = "NEA-ZAMECO I" + "\n" +
                    "Municipality: " + municipality + "\n" +
                    "Station: " + station + "\n" +
                    "Latitude: " + lat + "\n" +
                    "Longitude: " + lng + "\n" +
                    "Date: " + dateTime;

                    // Ensure 0th IFD exists
                    exifObj["0th"] = exifObj["0th"] || {};

                    // Embed description
                    exifObj["0th"][  piexif.ImageIFD.ImageDescription ] = description;

                    // Standard EXIF timestamp
                    exifObj.Exif = exifObj.Exif || {};

                    const exifDate = new Date().toISOString().replace("T"," ").substring(0,19);

                    exifObj.Exif[ piexif.ExifIFD.DateTimeOriginal ] = exifDate;
                    exifObj.Exif[ piexif.ExifIFD.DateTimeDigitized ] = exifDate;

                    const exifBytes = piexif.dump(exifObj);

                    finalImageData = piexif.insert( exifBytes, finalImageData );

                }
                catch(error) {

                    console.error( "EXIF error:", error );

                }

                document.getElementById("preview").innerHTML = `<img src="${finalImageData}">`;

                const base64 = finalImageData.split(",")[1];

                uploadImage(base64);

            };

            img.src = imageData;

        };

        reader.readAsDataURL(file);

    });

    function uploadImage(base64){

        document.getElementById("status").innerHTML = "<span class='loading'>Uploading...</span>";

        fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({
                municipality: document.getElementById("municipality").value,
                station: document.getElementById("specificLocation").value,
                dateFolder: today,
                fileName: document.getElementById("camera").files[0].name,
                mimeType: document.getElementById("camera").files[0].type,
                base64Data: base64,
                latitude: lat,
                longitude: lng
            })
        })

        .then(async res => {
            const text = await res.text();
            return JSON.parse(text);
        })

        .then(data => {

            if(data.success){

                document.getElementById("status").innerHTML = "<span class='success'>" + data.message + "</span>";

            }else{

                document.getElementById("status").innerHTML = "<span class='error'>" + data.message + "</span>";

            }

        })

        .catch(err => {

            console.error(err);

            document.getElementById("status").innerHTML = "<span class='error'>Backend not reachable</span>";

        });
    }
</script>
</body>
</html>
